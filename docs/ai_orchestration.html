function Pill({ label, color, small }) {
  return (
    <span style={{
      background: color + "20",
      border: `1px solid ${color}55`,
      borderRadius: 3,
      color: color,
      fontSize: small ? 9 : 10,
      fontFamily: "monospace",
      padding: small ? "1px 6px" : "2px 8px",
      fontWeight: 700,
      letterSpacing: 0.8,
      whiteSpace: "nowrap",
    }}>{label}</span>
  );
}

function CompCard({ id, onSelect, selected }) {
  const c = COMPONENTS[id];
  const isSelected = selected === id;
  return (
    <div
      onClick={() => onSelect(isSelected ? null : id)}
      style={{
        background: isSelected ? c.color + "18" : C.card,
        border: `1px solid ${isSelected ? c.color : C.border}`,
        borderLeft: `3px solid ${c.color}`,
        borderRadius: 6,
        padding: "8px 10px",
        cursor: "pointer",
        transition: "all 0.18s",
        boxShadow: isSelected ? `0 0 16px ${c.color}30` : "none",
        userSelect: "none",
      }}
    >
      <div style={{ display: "flex", align: "center", gap: 6, alignItems: "center" }}>
        <span style={{ color: c.color, fontSize: 14 }}>{c.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ color: C.textBright, fontSize: 11, fontWeight: 700, lineHeight: 1.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.label}</div>
          <div style={{ color: C.slate, fontSize: 9.5, fontFamily: "monospace", letterSpacing: 0.5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.sublabel}</div>
        </div>
        {isSelected && <span style={{ color: c.color, fontSize: 10, flexShrink: 0 }}>{"\u25BC"}</span>}
      </div>
    </div>
  );
}

function FlowLine({ label, color, style: flowStyle, type }) {
  const isDashed = flowStyle === "dashed";
  const isBi = type === "bidirectional";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 2, minWidth: 60 }}>
        {isBi ? (
          <span style={{ color, fontSize: 12 }}>{"\u27F7"}</span>
        ) : (
          <span style={{ color, fontSize: 12 }}>{"\u2192"}</span>
        )}
      </div>
      <div style={{ flex: 1, height: 1, background: isDashed ? `repeating-linear-gradient(90deg, ${color} 0, ${color} 4px, transparent 4px, transparent 8px)` : color, opacity: 0.7 }} />
      <span style={{ color: C.slateLight, fontSize: 10, fontFamily: "monospace", whiteSpace: "nowrap" }}>{label}</span>
    </div>
  );
}
